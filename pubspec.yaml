name: tinyworld_app
description: TinyWorld Chat — friendship simulation
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.3
  web_socket_channel: ^2.4.0
  go_router: ^13.2.3
  camera: ^0.11.0
  firebase_core: ^2.27.1
  firebase_auth: ^4.17.9
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  firebase_messaging: ^14.7.19
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  lottie: ^3.1.0
  crypto: ^3.0.3
  speech_to_text: ^6.6.0
  google_fonts: ^6.1.0
  confetti: ^0.7.0
  flame: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/city/Buildings/
    - assets/city/Props/
    - assets/city/grounds/
    - assets/city/Vehicles/
    - assets/city/Images/
